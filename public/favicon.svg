<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="#0a0f1a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Subtle grid -->
  <rect width="100" height="100" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Chart line -->
  <path 
    d="M 15 65 L 30 55 L 45 60 L 60 40 L 75 35 L 90 25" 
    fill="none" 
    stroke="#10b981" 
    stroke-width="4" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Chart area fill -->
  <path 
    d="M 15 65 L 30 55 L 45 60 L 60 40 L 75 35 L 90 25 L 90 85 L 15 85 Z" 
    fill="url(#chartGradient)"
  />
  
  <!-- Data points -->
  <circle cx="15" cy="65" r="3" fill="#10b981"/>
  <circle cx="30" cy="55" r="3" fill="#10b981"/>
  <circle cx="45" cy="60" r="3" fill="#10b981"/>
  <circle cx="60" cy="40" r="3" fill="#10b981"/>
  <circle cx="75" cy="35" r="3" fill="#10b981"/>
  <circle cx="90" cy="25" r="4" fill="#10b981" stroke="#0a0f1a" stroke-width="2"/>
  
  <!-- VN indicator -->
  <text x="50" y="15" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#64748b">VN</text>
  
  <!-- Border glow -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
</svg>
